<svg width="1600" height="1100" viewBox="0 0 1600 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="1" stop-color="#111A33"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#16203F"/>
      <stop offset="1" stop-color="#0F1730"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow-teal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#5EEAD4"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#60A5FA"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#F59E0B"/>
    </marker>
    <style>
      .title { font: 700 40px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #CBD5E1; }
      .section { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #E2E8F0; }
      .body { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #D8E2F0; }
      .small { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #AFC0D8; }
      .chip { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
    </style>
  </defs>

  <rect width="1600" height="1100" rx="24" fill="url(#bg)"/>

  <text x="60" y="72" class="title">StockCopilot Architecture Overview</text>
  <text x="60" y="106" class="subtitle">多 Agent · 多 MCP · Local-first · Trading Loop · 股票垂直自研编排引擎</text>

  <rect x="60" y="150" width="1480" height="160" rx="24" fill="url(#panel)" stroke="#28406D" filter="url(#shadow)"/>
  <text x="90" y="188" class="section">Desktop Workstation / 用户工作台</text>
  <text x="90" y="222" class="body">股票信息 · 情绪轮动 · 全量资讯库 · 股票推荐 · 交易日志 · 财报中心</text>
  <text x="90" y="252" class="small">这是用户直接操作的桌面层，也是研究、执行、复盘的统一入口。</text>
  <rect x="1180" y="182" width="120" height="34" rx="17" fill="url(#accent1)"/><text x="1212" y="204" class="chip">Local-first</text>
  <rect x="1318" y="182" width="90" height="34" rx="17" fill="url(#accent2)"/><text x="1342" y="204" class="chip">Multi-Agent</text>
  <rect x="1422" y="182" width="78" height="34" rx="17" fill="url(#accent3)"/><text x="1448" y="204" class="chip">MCP</text>

  <rect x="60" y="360" width="700" height="300" rx="24" fill="url(#panel)" stroke="#285E61" filter="url(#shadow)"/>
  <text x="90" y="400" class="section">研究编排层 / Research Orchestration</text>
  <rect x="90" y="430" width="280" height="86" rx="18" fill="#122A2E" stroke="#2DD4BF"/>
  <text x="112" y="464" class="body">Research Runner</text>
  <text x="112" y="492" class="small">多阶段 Pipeline · 状态机 · Turn/Stage 持久化</text>

  <rect x="410" y="430" width="320" height="86" rx="18" fill="#18274A" stroke="#60A5FA"/>
  <text x="432" y="464" class="body">Research Role Executor</text>
  <text x="432" y="492" class="small">角色执行 · Prompt 治理 · 结果压缩 · 重试</text>

  <rect x="90" y="546" width="640" height="84" rx="18" fill="#27163D" stroke="#A78BFA"/>
  <text x="112" y="580" class="body">多 Agent 协作</text>
  <text x="112" y="608" class="small">分析师团队 · 研究辩论 · 交易提案 · 风险辩论 · 组合决策</text>

  <path d="M370 473H395" stroke="#5EEAD4" stroke-width="4" marker-end="url(#arrow-teal)"/>
  <path d="M570 516V532" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrow-blue)"/>

  <rect x="840" y="360" width="700" height="300" rx="24" fill="url(#panel)" stroke="#365A8A" filter="url(#shadow)"/>
  <text x="870" y="400" class="section">MCP / Tool Governance Layer</text>
  <rect x="870" y="430" width="280" height="86" rx="18" fill="#14253D" stroke="#60A5FA"/>
  <text x="892" y="464" class="body">MCP Tool Gateway</text>
  <text x="892" y="492" class="small">权限控制 · 超时 · 重试 · Trace · 审计</text>

  <rect x="1180" y="430" width="320" height="180" rx="18" fill="#2C1C12" stroke="#F59E0B"/>
  <text x="1202" y="464" class="body">多 MCP 工具族</text>
  <text x="1202" y="494" class="small">公司概况 / 基本面 / 财报趋势</text>
  <text x="1202" y="520" class="small">市场上下文 / 新闻 / 技术指标</text>
  <text x="1202" y="546" class="small">Web Search / Web Read / 策略结果</text>

  <path d="M1150 473H1165" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrow-blue)"/>

  <rect x="60" y="710" width="1480" height="170" rx="24" fill="url(#panel)" stroke="#6B4F1F" filter="url(#shadow)"/>
  <text x="90" y="750" class="section">Local-first Runtime / 本地运行时</text>
  <rect x="90" y="780" width="250" height="70" rx="16" fill="#1A2545" stroke="#60A5FA"/>
  <text x="112" y="820" class="body">ASP.NET Core API</text>
  <rect x="370" y="780" width="280" height="70" rx="16" fill="#173028" stroke="#34D399"/>
  <text x="392" y="810" class="body">Financial Worker</text>
  <text x="392" y="834" class="small">财报采集 / PDF 解析 / 本地落库</text>
  <rect x="680" y="780" width="250" height="70" rx="16" fill="#291D43" stroke="#A78BFA"/>
  <text x="712" y="820" class="body">SQLite / 本地数据资产</text>
  <rect x="960" y="780" width="250" height="70" rx="16" fill="#3A2318" stroke="#F59E0B"/>
  <text x="992" y="810" class="body">Ollama / 本地模型治理</text>
  <text x="992" y="834" class="small">参数控制 / 审计 / Trace</text>
  <rect x="1240" y="780" width="270" height="70" rx="16" fill="#18243A" stroke="#94A3B8"/>
  <text x="1262" y="810" class="body">Desktop Packaging</text>
  <text x="1262" y="834" class="small">WinForms + WebView2 + 安装包交付</text>

  <path d="M410 660C410 694 410 694 410 710" stroke="#5EEAD4" stroke-width="4" marker-end="url(#arrow-teal)"/>
  <path d="M1190 660C1190 694 1190 694 1190 710" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrow-blue)"/>

  <rect x="60" y="920" width="1480" height="130" rx="24" fill="url(#panel)" stroke="#934D19" filter="url(#shadow)"/>
  <text x="90" y="960" class="section">Trading Loop / 交易闭环</text>
  <text x="90" y="998" class="body">市场与个股信息  →  AI 研究与推荐  →  交易计划  →  交易执行记录  →  复盘与纪律闭环  →  再次观察市场</text>
  <text x="90" y="1028" class="small">系统的核心价值不只是“分析”，而是把研究、执行、记录和复盘持续串成闭环。</text>

  <path d="M800 310V342" stroke="#5EEAD4" stroke-width="5" marker-end="url(#arrow-teal)"/>
  <path d="M800 660V692" stroke="#60A5FA" stroke-width="5" marker-end="url(#arrow-blue)"/>
  <path d="M800 880V904" stroke="#F59E0B" stroke-width="5" marker-end="url(#arrow-orange)"/>
</svg>
